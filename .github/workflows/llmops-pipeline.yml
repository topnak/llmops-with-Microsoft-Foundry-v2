# LLMOps Pipeline — unified connected pipeline with 5 visual stages.
#
# GitHub Actions renders this as a connected graph:
#
#   ┌───────────────────┐    ┌──────────────────┐    ┌─────────────────┐    ┌─────────────────────────┐    ┌──────────────────┐
#   │ 1. Unit Tests     │ →  │ 2. Validate      │ →  │ 3. Detect       │ →  │ 4. Evaluate Quality     │ →  │ 5. Pipeline      │
#   │ (26 pytest tests  │    │ Prompts & Data   │    │ Prompt Changes  │    │ (12 cases × 4 dims ×    │    │ Report           │
#   │  on Py 3.11+3.12) │    │ (integrity +     │    │ (git diff)      │    │  multi-model)           │    │ (summary +       │
#   │                   │    │  checksums)       │    │                 │    │                         │    │  artifacts)      │
#   └───────────────────┘    └──────────────────┘    └─────────────────┘    └─────────────────────────┘    └──────────────────┘

name: LLMOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Unit Tests
  #   What: 26 pytest tests covering prompt loading, persona data,
  #          evaluation scoring, monitoring, and configuration
  #   Against: Python 3.11 and 3.12
  # ──────────────────────────────────────────────────────────────────
  unit-tests:
    name: "1. Unit Tests — pytest (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Run 26 tests: prompts, personas, eval scoring, monitoring, config"
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src

  # ──────────────────────────────────────────────────────────────────
  # Stage 2: Validate Prompts & Data Integrity
  #   What: Check all 4+ prompt files exist, are non-empty, and valid.
  #          Compute checksums for version tracking.
  #          Verify 5 personas, 17 products, 12 eval cases load correctly.
  # ──────────────────────────────────────────────────────────────────
  validate:
    name: "2. Validate Prompts & Data Integrity"
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Validate 4 prompt variants + compute checksums"
        run: |
          python -c "
          from llmops_demo.prompt_manager import list_prompts, validate_prompt, prompt_checksum
          prompts = list_prompts()
          assert len(prompts) >= 4, f'Expected >= 4 prompts, got {len(prompts)}'
          print('Prompt Validation:')
          print('-' * 60)
          for p in prompts:
              ok, issues = validate_prompt(p)
              cs = prompt_checksum(p)
              status = 'PASS' if ok else f'FAIL: {issues}'
              print(f'  {p:25s} {status:10s}  checksum={cs}')
              assert ok, f'Prompt {p} invalid: {issues}'
          print(f'\nAll {len(prompts)} prompts validated.')
          "
        env:
          PYTHONPATH: src

      - name: "Verify data: 5 personas, 17 products, 12 eval cases, 10 steps"
        run: |
          python -c "
          from llmops_demo.memory import load_personas, load_products
          from llmops_demo.utils import load_demo_story, load_demo_steps
          from llmops_demo.evaluation import load_eval_cases

          personas = load_personas()
          products = load_products()
          stages = load_demo_story()['stages']
          steps = load_demo_steps()
          cases = load_eval_cases()

          print('Data Integrity:')
          print('-' * 60)
          checks = [
              ('Personas',    len(personas), 5,  '=='),
              ('Products',    len(products), 12, '>='),
              ('Demo stages', len(stages),   10, '=='),
              ('Demo steps',  len(steps),    10, '=='),
              ('Eval cases',  len(cases),    12, '>='),
          ]
          for name, actual, expected, op in checks:
              ok = (actual == expected) if op == '==' else (actual >= expected)
              status = 'PASS' if ok else 'FAIL'
              print(f'  {name:15s} {actual:3d} (expected {op} {expected})  {status}')
              assert ok, f'{name}: expected {op} {expected}, got {actual}'
          print('\nAll data integrity checks passed.')
          "
        env:
          PYTHONPATH: src

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Detect Prompt Changes
  #   What: Git diff to find which prompt .txt files changed
  #   Output: List of changed prompts for targeted evaluation
  # ──────────────────────────────────────────────────────────────────
  detect-changes:
    name: "3. Detect Prompt Changes (git diff)"
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      changed_prompts: ${{ steps.detect.outputs.changed_prompts }}
      has_prompt_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Identify changed prompt files
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- prompts/ | xargs -I{} basename {} .txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          else
            CHANGED=$(ls prompts/*.txt 2>/dev/null | xargs -I{} basename {} .txt | tr '\n' ',' | sed 's/,$//')
          fi
          echo "changed_prompts=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No prompt files changed in this commit."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed prompts: $CHANGED"
          fi

  # ──────────────────────────────────────────────────────────────────
  # Stage 4: Evaluate Quality
  #   What: Score prompts on 12 eval cases across 4 quality dimensions:
  #     • Relevance       — does the response address the query?
  #     • Personalization  — does it use persona context?
  #     • Grounding        — does it stick to catalogue products?
  #     • Policy/Safety    — does it follow safety rules?
  #   Against: Each configured model (gpt-4.1-mini, gpt-4.1)
  #   Mode: dry-run (no Azure cost). Remove --dry-run for live eval.
  # ──────────────────────────────────────────────────────────────────
  evaluate:
    name: "4. Evaluate Quality (12 cases × 4 dimensions)"
    needs: detect-changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Eval baseline prompt — relevance, personalization, grounding, safety"
        run: |
          echo "Prompt: baseline | 12 cases | 4 scoring dimensions"
          python scripts/run_eval.py --dry-run --prompt baseline
        env:
          PYTHONPATH: src

      - name: "Eval changed prompts — targeted quality check"
        if: needs.detect-changes.outputs.has_prompt_changes == 'true'
        run: |
          IFS=',' read -ra PROMPTS <<< "${{ needs.detect-changes.outputs.changed_prompts }}"
          for prompt in "${PROMPTS[@]}"; do
            echo ""
            echo "========================================================"
            echo "  Evaluating changed prompt: $prompt"
            echo "  12 cases × (relevance + personalization + grounding + safety)"
            echo "========================================================"
            python scripts/run_eval.py --dry-run --prompt "$prompt"
          done
        env:
          PYTHONPATH: src

      - name: "Multi-model readiness check"
        run: |
          python -c "
          from llmops_demo.config import COMPARISON_MODELS
          print('Multi-Model Configuration:')
          print('-' * 50)
          for i, model in enumerate(COMPARISON_MODELS, 1):
              print(f'  Model {i}: {model}  [ready]')
          print()
          print(f'Total models: {len(COMPARISON_MODELS)}')
          print('Mode: dry-run (remove --dry-run and add Azure secrets for live eval)')
          "
        env:
          PYTHONPATH: src

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: results/
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────
  # Stage 5: Pipeline Report
  #   What: Generate summary report with scores and upload artifacts
  #   Output: demo_report.md + GitHub Actions job summary table
  # ──────────────────────────────────────────────────────────────────
  report:
    name: "5. Pipeline Report & Artifacts"
    needs: [detect-changes, evaluate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate demo report
        run: python scripts/export_demo_report.py
        env:
          PYTHONPATH: src

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: results/demo_report.md
          if-no-files-found: warn

      - name: Write pipeline summary
        run: |
          echo "## LLMOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | What was checked | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **1. Unit Tests** | 26 pytest tests (prompt loading, persona data, eval scoring, monitoring, config) on Python 3.11 + 3.12 | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| **2. Validate** | 4 prompts validated + checksums computed + data integrity (5 personas, 17 products, 12 eval cases, 10 steps) | Passed |" >> $GITHUB_STEP_SUMMARY
          HAS_CHANGES="${{ needs.detect-changes.outputs.has_prompt_changes }}"
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "| **3. Detect** | Prompt files changed: **${{ needs.detect-changes.outputs.changed_prompts }}** | Detected |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **3. Detect** | No prompt files changed in this commit | No changes |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| **4. Evaluate** | 12 eval cases scored on 4 dimensions per prompt (relevance, personalization, grounding, policy/safety) | Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| **5. Report** | Summary generated and uploaded as artifact | Complete |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Evaluation Dimensions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Dimension | What it measures | Scale |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-----------------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Relevance** | Does the response address the user's query? | 0-5 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Personalization** | Does it use persona context (budget, preferences)? | 0-5 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Grounding** | Does it recommend only approved catalogue products? | 0-5 |" >> $GITHUB_STEP_SUMMARY
          echo "| **Policy/Safety** | Does it follow safety and policy rules? | 0-5 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/demo_report.md ]; then
            echo "### Report Preview" >> $GITHUB_STEP_SUMMARY
            head -50 results/demo_report.md >> $GITHUB_STEP_SUMMARY
          fi
