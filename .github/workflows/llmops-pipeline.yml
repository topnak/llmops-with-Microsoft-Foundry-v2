# LLMOps Pipeline — unified connected pipeline for prompt changes.
# Shows a visual pipeline graph in GitHub Actions with connected stages.
#
# Triggers:
#   - Push to main (any file)
#   - Pull request to main
#   - Manual dispatch
#
# Pipeline stages:
#   ┌──────┐     ┌──────────┐     ┌────────────────┐     ┌──────────┐     ┌──────────┐
#   │ Test │ ──→ │ Validate │ ──→ │ Detect Changes │ ──→ │ Evaluate │ ──→ │  Report  │
#   │      │     │ Prompts  │     │                │     │          │     │          │
#   └──────┘     └──────────┘     └────────────────┘     └──────────┘     └──────────┘

name: LLMOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Stage 1: Test — run pytest across Python versions
  # ──────────────────────────────────────────────────────────────────
  test:
    name: "1. Test"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
        env:
          PYTHONPATH: src

  # ──────────────────────────────────────────────────────────────────
  # Stage 2: Validate Prompts — check all prompt files
  # ──────────────────────────────────────────────────────────────────
  validate-prompts:
    name: "2. Validate Prompts"
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate all prompts
        run: |
          python -c "
          from llmops_demo.prompt_manager import list_prompts, validate_prompt, get_prompt_checksum
          prompts = list_prompts()
          assert len(prompts) >= 4, f'Expected >= 4 prompts, got {len(prompts)}'
          for p in prompts:
              ok, issues = validate_prompt(p)
              checksum = get_prompt_checksum(p)
              print(f'  {p}: valid={ok}  checksum={checksum}')
              assert ok, f'Prompt {p} invalid: {issues}'
          print(f'\nAll {len(prompts)} prompts validated.')
          "
        env:
          PYTHONPATH: src

      - name: Smoke check data files
        run: |
          python -c "
          from llmops_demo.memory import load_personas, load_products
          from llmops_demo.utils import load_demo_story, load_demo_steps
          assert len(load_personas()) == 5, 'Expected 5 personas'
          assert len(load_products()) >= 12, 'Expected >= 12 products'
          assert len(load_demo_story()['stages']) == 10, 'Expected 10 stages'
          assert len(load_demo_steps()) == 10, 'Expected 10 steps'
          print('Data smoke check passed.')
          "
        env:
          PYTHONPATH: src

  # ──────────────────────────────────────────────────────────────────
  # Stage 3: Detect Changes — identify which prompts changed
  # ──────────────────────────────────────────────────────────────────
  detect-changes:
    name: "3. Detect Prompt Changes"
    needs: validate-prompts
    runs-on: ubuntu-latest
    outputs:
      changed_prompts: ${{ steps.detect.outputs.changed_prompts }}
      has_prompt_changes: ${{ steps.detect.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed prompt files
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- prompts/ | xargs -I{} basename {} .txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          else
            CHANGED=$(ls prompts/*.txt 2>/dev/null | xargs -I{} basename {} .txt | tr '\n' ',' | sed 's/,$//')
          fi
          echo "changed_prompts=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No prompt files changed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed prompts: $CHANGED"
          fi

  # ──────────────────────────────────────────────────────────────────
  # Stage 4: Evaluate — run eval suite on changed prompts (or baseline)
  # ──────────────────────────────────────────────────────────────────
  evaluate:
    name: "4. Evaluate"
    needs: detect-changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation (baseline)
        run: |
          python scripts/run_eval.py --dry-run --prompt baseline
        env:
          PYTHONPATH: src

      - name: Run evaluation (changed prompts)
        if: needs.detect-changes.outputs.has_prompt_changes == 'true'
        run: |
          IFS=',' read -ra PROMPTS <<< "${{ needs.detect-changes.outputs.changed_prompts }}"
          for prompt in "${PROMPTS[@]}"; do
            echo ""
            echo "=========================================="
            echo "Evaluating changed prompt: $prompt"
            echo "=========================================="
            python scripts/run_eval.py --dry-run --prompt "$prompt"
          done
        env:
          PYTHONPATH: src

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: results/
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────────────────
  # Stage 5: Report — generate summary
  # ──────────────────────────────────────────────────────────────────
  report:
    name: "5. Report"
    needs: [detect-changes, evaluate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report
        run: python scripts/export_demo_report.py
        env:
          PYTHONPATH: src

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: results/demo_report.md
          if-no-files-found: warn

      - name: Write job summary
        run: |
          echo "## LLMOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1. Test | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. Validate Prompts | Passed |" >> $GITHUB_STEP_SUMMARY
          HAS_CHANGES="${{ needs.detect-changes.outputs.has_prompt_changes }}"
          if [ "$HAS_CHANGES" = "true" ]; then
            echo "| 3. Detect Changes | Changed: ${{ needs.detect-changes.outputs.changed_prompts }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 3. Detect Changes | No prompt changes |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| 4. Evaluate | Complete |" >> $GITHUB_STEP_SUMMARY
          echo "| 5. Report | Generated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/demo_report.md ]; then
            echo "### Report Preview" >> $GITHUB_STEP_SUMMARY
            head -50 results/demo_report.md >> $GITHUB_STEP_SUMMARY
          fi
