# Prompt Change Detection — triggers when prompt files change on main.
# Runs targeted evaluation for each changed prompt variant.
name: Prompt Change Detection

on:
  push:
    branches: [main]
    paths:
      - "prompts/**"

jobs:
  detect-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout with history for diff
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # 2. Identify changed prompt files
      - name: Detect changed prompts
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- prompts/ | xargs -I{} basename {} .txt | tr '\n' ',')
          CHANGED=${CHANGED%,}  # Remove trailing comma
          echo "changed_prompts=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Changed prompts: $CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # 3. Set up Python
      - name: Set up Python
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. Install dependencies
      - name: Install dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Validate changed prompts
      - name: Validate changed prompts
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          IFS=',' read -ra PROMPTS <<< "${{ steps.detect.outputs.changed_prompts }}"
          for prompt in "${PROMPTS[@]}"; do
            echo "Validating: $prompt"
            python -c "
          from llmops_demo.prompt_manager import validate_prompt, prompt_checksum
          ok, issues = validate_prompt('$prompt')
          checksum = prompt_checksum('$prompt')
          print(f'  Valid: {ok}')
          print(f'  Checksum: {checksum}')
          if not ok:
              print(f'  Issues: {issues}')
              exit(1)
          "
          done
        env:
          PYTHONPATH: src

      # 6. Run evaluation for each changed prompt (dry-run)
      - name: Evaluate changed prompts
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          IFS=',' read -ra PROMPTS <<< "${{ steps.detect.outputs.changed_prompts }}"
          for prompt in "${PROMPTS[@]}"; do
            echo ""
            echo "=========================================="
            echo "Evaluating prompt: $prompt"
            echo "=========================================="
            python scripts/run_eval.py --prompt "$prompt" --dry-run
          done
        env:
          PYTHONPATH: src

      # 7. Upload results
      - name: Upload evaluation results
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-change-eval-results
          path: results/
          if-no-files-found: warn

      # 8. Summary
      - name: Write job summary
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          echo "## Prompt Change Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changed prompts**: ${{ steps.detect.outputs.changed_prompts }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/eval_summary.json ]; then
            echo "### Evaluation Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat results/eval_summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
